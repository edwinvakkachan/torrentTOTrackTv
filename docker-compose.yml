version: "3.8"

services:
  torrenttotraktv:
    build: .
    container_name: torrenttotraktv
    restart: no
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      QBITIP: ${QBITIP}
      QBITUSER: ${QBITUSER}
      QBITPASS: ${QBITPASS}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      TRAKT_TOKEN: ${TRAKT_TOKEN}

   






